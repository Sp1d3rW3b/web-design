<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Pretty Webpages!</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <div class="header">
            <div>This is a Header Flexbox</div>
            <a href="#">Box for Links</a>
            <div>Box for Icons</div>
        </div>
        
        <div id="main">
            <h1>Main Webpage</h1>

            <h3>Flexbox Layout</h3>
            <p>
                Layouts in one dimension. 
                Things like navigation bars, sidebars, 
                footers, or lining items in a row/column.
            </p>
            <div class="container">
                <span class="flex-layout">
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                </span>
                
                <span class="flex-layout" style="flex-direction: column;">
                    <div>1</div>
                    <div>2</div>
                    <div>3</div>
                    <div>4</div>
                </span>
            </div>

            <h3>Grid Layout</h3>
            <p>
                Layouts in two dimensions.
            </p>
            <div class="grid-layout">
                <div>1</div>
                <div>2</div>
                <div>3</div>
                <div>4</div>
            </div>
        </div>
        
        <div class="footer">This is a Footer Flexbox</div>
    </body>
</html>
